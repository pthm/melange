name: CI - Internal Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Go workspace
        run: go work init . ./cmd/melange ./docs ./melange

      - name: Install tools
        run: go install tool

      - name: Generate test authz package
        run: go run ./cmd/melange generate client --runtime go --schema test/testutil/testdata/schema.fga --output test/authz/ --package authz --id-type int64

      - name: Lint all modules
        run: |
          # Uses golangci-lint version pinned in go.mod via tool directive
          # After `go install tool`, binary is in $GOPATH/bin which is in PATH
          golangci-lint run ./...
          cd melange && golangci-lint run ./...
          cd ../cmd/melange && golangci-lint run ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Go workspace
        run: go work init . ./cmd/melange ./docs ./melange

      - name: Generate test authz package
        run: go run ./cmd/melange generate client --runtime go --schema test/testutil/testdata/schema.fga --output test/authz/ --package authz --id-type int64

      - name: Run unit tests (root module)
        run: go test -short -race -coverprofile=coverage-root.out -covermode=atomic ./...

      - name: Run unit tests (melange core module)
        working-directory: melange
        run: go test -short -race -coverprofile=coverage-runtime.out -covermode=atomic ./...

      - name: Run unit tests (cmd/melange module)
        working-directory: cmd/melange
        run: go test -short -race -coverprofile=coverage-cmd.out -covermode=atomic ./...

      - name: Install TypeScript dependencies
        working-directory: clients/typescript
        run: pnpm install

      - name: Run TypeScript unit tests
        working-directory: clients/typescript
        run: pnpm test:unit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-root.out,./melange/coverage-runtime.out,./cmd/melange/coverage-cmd.out
          flags: unit
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests (Go + TypeScript)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Go workspace
        run: go work init . ./cmd/melange ./docs ./melange

      - name: Generate test authz package
        run: go run ./cmd/melange generate client --runtime go --schema test/testutil/testdata/schema.fga --output test/authz/ --package authz --id-type int64

      - name: Install TypeScript dependencies
        working-directory: clients/typescript
        run: pnpm install

      - name: Run Go integration tests
        working-directory: test
        run: go test -timeout 5m -race -p 1 -parallel 1 -coverprofile=coverage-integration.out -covermode=atomic -coverpkg=github.com/pthm/melange/... ./...

      - name: Run TypeScript integration tests
        working-directory: clients/typescript
        run: pnpm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test/coverage-integration.out
          flags: integration
          fail_ci_if_error: false
