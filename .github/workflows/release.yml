name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. v0.9.0). Leave blank for normal release-please flow."
        required: false
        default: ""
      dry_run:
        description: "Exercise the release flow without pushing tags, publishing, or mutating anything externally"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
      body: ${{ steps.rp.outputs.body }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # The `release` job creates the tag/GitHub release after bumping go.mod,
          # so we don't let release-please do it here (the tag would otherwise sit
          # on a commit whose go.mod still references the previous melange/ runtime).
          skip-github-release: true

  release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.release-please.outputs.tag_name || github.event.inputs.version }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
    steps:
      - name: Validate version and announce mode
        run: |
          if [ -z "$VERSION" ]; then
            echo "❌ VERSION is empty — release-please did not produce a tag and no override was supplied"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "❌ VERSION must look like v1.2.3 or v1.2.3-rc.1, got: $VERSION"
            exit 1
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice title=Dry run::Releasing $VERSION in DRY RUN mode — no tags or publishes will leave the runner."
          else
            echo "::notice title=Release::Releasing $VERSION"
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "melange-release-bot"
          git config user.email "melange-release-bot@users.noreply.github.com"

      # mise.toml pins go, goreleaser, node, pnpm, and quill (via ubi backend)
      # — one source of truth for tooling between local dev and CI.
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # go.work is gitignored (each contributor owns theirs) but goreleaser
      # builds cmd/melange, which lives in a separate module. Synthesize a
      # workspace so cross-module builds resolve.
      - name: Setup Go workspace
        run: go work init . ./cmd/melange ./docs ./melange

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag melange/ runtime
        run: |
          melange_tag="melange/${VERSION}"
          if git ls-remote --tags origin | grep -q "refs/tags/${melange_tag}$"; then
            echo "✓ remote tag ${melange_tag} already exists — skipping"
            exit 0
          fi
          git tag -a "${melange_tag}" -m "${melange_tag}"
          if [ "$DRY_RUN" = "true" ]; then
            git push --dry-run origin "${melange_tag}"
            echo "↪ dry-run: ${melange_tag} tag created locally only"
          else
            git push origin "${melange_tag}"
          fi

      - name: Wait for goproxy to index melange/
        if: env.DRY_RUN != 'true'
        run: |
          for i in $(seq 1 30); do
            if GOPROXY=https://proxy.golang.org go list -m "github.com/pthm/melange/melange@${VERSION}" >/dev/null 2>&1; then
              echo "✓ melange/${VERSION} indexed"
              exit 0
            fi
            echo "  waiting for goproxy... (${i}/30)"
            sleep 10
          done
          echo "❌ goproxy did not index melange/${VERSION} within 5 minutes"
          exit 1

      - name: Bump root go.mod and push
        if: env.DRY_RUN != 'true'
        run: |
          go mod edit -require="github.com/pthm/melange/melange@${VERSION}"
          GOPROXY=https://proxy.golang.org go mod tidy
          if git diff --quiet go.mod go.sum; then
            echo "✓ root go.mod already references melange/${VERSION}"
          else
            git add go.mod go.sum
            git commit -m "chore(release): bump root go.mod to melange/${VERSION}"
            git push origin HEAD:main
          fi

      - name: Bump root go.mod (dry run preview)
        if: env.DRY_RUN == 'true'
        run: |
          # The new melange/ tag wasn't pushed, so `go mod tidy` against it would fail.
          # Run only `go mod edit` to verify the bump syntax and show the diff.
          go mod edit -require="github.com/pthm/melange/melange@${VERSION}"
          echo "↪ dry-run: would bump root go.mod (skipping tidy since tag was not pushed)"
          git diff go.mod || true
          # Restore for any later steps that read go.mod
          git checkout -- go.mod

      - name: Tag root release
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "✓ remote tag ${VERSION} already exists — skipping"
            exit 0
          fi
          git tag -a "${VERSION}" -m "${VERSION}"
          if [ "$DRY_RUN" = "true" ]; then
            git push --dry-run origin "${VERSION}"
            echo "↪ dry-run: ${VERSION} tag created locally only"
          else
            git push origin "${VERSION}"
          fi

      - name: Write release notes for goreleaser
        run: |
          cat <<'NOTES_EOF' > .release-notes.md
          ${{ needs.release-please.outputs.body }}
          NOTES_EOF
          # Fallback for workflow_dispatch (no release-please body): extract from CHANGELOG.md
          if [ ! -s .release-notes.md ]; then
            awk -v ver="${VERSION#v}" '
              /^## \[/ { if (found) exit; found = ($0 ~ "\\["ver"\\]") ? 1 : 0; if (found) next }
              found { print }
            ' CHANGELOG.md > .release-notes.md || true
          fi

      - name: Run goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.QUILL_NOTARY_KEY }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.QUILL_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.QUILL_NOTARY_ISSUER }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            goreleaser release --snapshot --clean --skip=publish --release-notes .release-notes.md
          else
            goreleaser release --clean --release-notes .release-notes.md
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd clients/typescript
          pnpm install --frozen-lockfile
          pnpm build
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          if [ "$DRY_RUN" = "true" ]; then
            # `pnpm publish --dry-run` still hits the registry's version-collision
            # check, which fails because dry-runs don't bump package.json. Pack
            # the tarball locally instead, and use `npm whoami` to confirm the
            # auth token is valid.
            echo "↪ dry-run: verifying npm auth..."
            npm whoami
            echo "↪ dry-run: building and packing tarball..."
            pnpm pack
            echo "↪ dry-run: tarball created at clients/typescript/$(ls -1t *.tgz | head -1)"
            exit 0
          fi
          # Idempotent: skip if this version is already on the registry
          if npm view "@pthm/melange@${VERSION#v}" version >/dev/null 2>&1; then
            echo "✓ @pthm/melange@${VERSION#v} already published"
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Wait for goproxy to index root
        if: env.DRY_RUN != 'true'
        run: |
          for i in $(seq 1 30); do
            if GOPROXY=https://proxy.golang.org go list -m "github.com/pthm/melange@${VERSION}" >/dev/null 2>&1; then
              echo "✓ root ${VERSION} indexed"
              exit 0
            fi
            echo "  waiting for goproxy... (${i}/30)"
            sleep 10
          done
          echo "❌ goproxy did not index ${VERSION} within 5 minutes"
          exit 1

      - name: Bump and tag cmd/melange
        if: env.DRY_RUN != 'true'
        run: |
          cmd_tag="cmd/melange/${VERSION}"
          if git ls-remote --tags origin | grep -q "refs/tags/${cmd_tag}$"; then
            echo "✓ remote tag ${cmd_tag} already exists — skipping"
            exit 0
          fi
          git pull origin main --ff-only
          go mod edit -require="github.com/pthm/melange@${VERSION}" cmd/melange/go.mod
          GOPROXY=https://proxy.golang.org GOWORK=off go mod tidy -C cmd/melange
          if ! git diff --quiet cmd/melange/go.mod cmd/melange/go.sum; then
            git add cmd/melange/go.mod cmd/melange/go.sum
            git commit -m "chore(release): cmd/melange ${VERSION}"
            git push origin HEAD:main
          fi
          git tag -a "${cmd_tag}" -m "${cmd_tag}"
          git push origin "${cmd_tag}"

      - name: Bump and tag cmd/melange (dry run preview)
        if: env.DRY_RUN == 'true'
        run: |
          echo "↪ dry-run: would bump cmd/melange/go.mod to require github.com/pthm/melange@${VERSION}"
          echo "↪ dry-run: would tag and push cmd/melange/${VERSION}"
