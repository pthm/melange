# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: melange

# The repo has three tag prefixes — `vX.Y.Z` (root), `melange/vX.Y.Z` (runtime),
# and `cmd/melange/vX.Y.Z` (CLI). Only the root tag should drive goreleaser's
# .Version; the others contain slashes and would break docker tag rendering.
git:
  ignore_tags:
    - "melange/v*"
    - "cmd/melange/v*"

before:
  hooks:
    - ./scripts/verify-release.sh
    - go mod tidy

builds:
  # Non-darwin builds (no signing needed)
  - id: melange-linux-windows
    main: ./cmd/melange
    binary: melange
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/pthm/melange/lib/version.Version={{.Version}}
      - -X github.com/pthm/melange/lib/version.Commit={{.Commit}}
      - -X github.com/pthm/melange/lib/version.Date={{.Date}}

  # Darwin builds with code signing
  - id: melange-darwin
    main: ./cmd/melange
    binary: melange
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/pthm/melange/lib/version.Version={{.Version}}
      - -X github.com/pthm/melange/lib/version.Commit={{.Commit}}
      - -X github.com/pthm/melange/lib/version.Date={{.Date}}
    hooks:
      post:
        - cmd: ./scripts/sign-macos.sh "{{ .Path }}" --notarize
          output: true

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      - THIRD_PARTY_NOTICES

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: pthm
    name: melange
  draft: false
  prerelease: auto
  mode: replace
  name_template: "{{.ProjectName}} v{{.Version}}"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

nfpms:
  - id: packages
    package_name: melange
    ids:
      - melange-linux-windows
    homepage: "https://github.com/pthm/melange"
    description: "PostgreSQL Fine-Grained Authorization - OpenFGA to SQL compiler"
    maintainer: "Patt-tom McDonnell <pthm@users.noreply.github.com>"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: database
    contents:
      - src: LICENSE
        dst: /usr/share/doc/melange/LICENSE
      - src: README.md
        dst: /usr/share/doc/melange/README.md

dockers_v2:
  - id: melange-docker
    ids:
      - melange-linux-windows
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/pthm/melange"
    tags:
      - "v{{ .Version }}"
      - '{{ if not .Prerelease }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/pthm/melange"
      "org.opencontainers.image.description": "PostgreSQL Fine-Grained Authorization - OpenFGA to SQL compiler"
      "org.opencontainers.image.licenses": "MIT"

homebrew_casks:
  - name: melange
    repository:
      owner: pthm
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/pthm/melange"
    description: "PostgreSQL Fine-Grained Authorization - OpenFGA to SQL compiler"
    license: "MIT"
